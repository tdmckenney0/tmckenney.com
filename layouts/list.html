{{ define "main" }}
<h1 class="title has-text-justified is-uppercase">{{ .Title }}</h1>
<div class="content has-text-justified">
    {{ .Content }}
    {{ range .Pages }}
    <h2 class="is-clipped"><a href="{{ .RelPermalink }}">{{ .LinkTitle }}</a></h2>
    {{ .Summary }}<a href="{{ .RelPermalink }}">(cont.)</a>
    {{ end }}
</div>
{{ end }}

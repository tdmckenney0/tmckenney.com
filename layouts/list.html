{{ define "main" }}
<h1 class="page-title">{{ .Title }}</h1>
<div class="page-content article-list">
    {{ .Content }}
    {{ range .Pages }}
    <article class="article-card">
        <h2 class="article-title"><a href="{{ .RelPermalink }}">{{ .LinkTitle }}</a></h2>
        <p class="article-summary">{{ .Summary }} <a href="{{ .RelPermalink }}" class="read-more">(cont.)</a></p>
    </article>
    {{ end }}
</div>
{{ end }}

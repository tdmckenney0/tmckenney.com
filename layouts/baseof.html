<!DOCTYPE html>
<html lang="{{ site.Language.LanguageCode }}" dir="{{ or site.Language.LanguageDirection `ltr` }}">

<head>
    {{ partial "head.html" . }}
</head>

<body>
    <section id="content" class="section">
        <div class="container">
            <div class="box">
                <div class="block">
                    <header>{{ partial "header.html" . }}</header>
                </div>
                <div class="block">
                    {{ partial "nav.html" . }}
                </div>
                <div class="block">
                    <main>
                        {{ block "main" . }}
                        {{ end }}
                    </main>
                </div>
                <div class="block">
                    <footer>
                        {{ partial "footer.html" . }}
                    </footer>
                </div>
            </div>
        </div>
    </section>

    <canvas class="webgl"></canvas>
</body>

</html>
